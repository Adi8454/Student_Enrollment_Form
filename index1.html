<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
            margin-top: 40px;
        }

        h2 {
            font-weight: bold;
            color: #333;
        }

        .btn {
            min-width: 120px;
        }

        @media(max-width:768px){
            .form-card {
                padding: 20px;
            }

            .btn {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body onload="resetForm()">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9 col-sm-12">
            <div class="form-card">
                <h2 class="text-center mb-4">Student Enrollment Form</h2>

                <form id="studentForm">
                    <div class="mb-3">
                        <label class="form-label">Roll No *</label>
                        <input type="text" class="form-control" id="rollNo" onchange="checkStudent();">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="fullName">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Class *</label>
                        <input type="text" class="form-control" id="studentClass">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Birth Date *</label>
                        <input type="date" class="form-control" id="birthDate">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address *</label>
                        <textarea class="form-control" id="address" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Enrollment Date *</label>
                        <input type="date" class="form-control" id="enrollmentDate">
                    </div>

                    <div class="text-center">
                        <button type="button" id="saveBtn" class="btn btn-success me-2" onclick="saveStudent()">Save</button>
                        <button type="button" id="updateBtn" class="btn btn-warning me-2" onclick="updateStudent()">Update</button>
                        <button type="button" id="resetBtn" class="btn btn-danger" onclick="resetForm()">Reset</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
    const connToken = "90935204|-31949243650444739|90958775";
    const dbName = "SCHOOL-DB";
    const relName = "STUDENT-TABLE";
    const baseUrl = "http://api.login2explore.com:5577";
    const apiEndPoint = "/api/iml";

    function disableFields() {
        $("#fullName, #studentClass, #birthDate, #address, #enrollmentDate")
            .prop("disabled", true);
    }

    function enableFields() {
        $("#fullName, #studentClass, #birthDate, #address, #enrollmentDate")
            .prop("disabled", false);
    }

    function resetForm() {
        $("#studentForm")[0].reset();

        $("#rollNo").prop("disabled", false);
        disableFields();

        $("#saveBtn").prop("disabled", true);
        $("#updateBtn").prop("disabled", true);
        $("#resetBtn").prop("disabled", true);

        $("#rollNo").focus();
    }

    function validateForm() {
        if ($("#rollNo").val() === "" ||
            $("#fullName").val() === "" ||
            $("#studentClass").val() === "" ||
            $("#birthDate").val() === "" ||
            $("#address").val() === "" ||
            $("#enrollmentDate").val() === "") {
            alert("Please fill all fields.");
            return false;
        }
        return true;
    }

    function getStudentData() {
        return JSON.stringify({
            "Roll-No": $("#rollNo").val(),
            "Full-Name": $("#fullName").val(),
            "Class": $("#studentClass").val(),
            "Birth-Date": $("#birthDate").val(),
            "Address": $("#address").val(),
            "Enrollment-Date": $("#enrollmentDate").val()
        });
    }

    function checkStudent() {
        let rollNo = $("#rollNo").val();

        if (rollNo === "") return;

        let jsonObj = {
            "Roll-No": rollNo
        };

        let req = createGET_BY_KEYRequest(connToken, dbName, relName, JSON.stringify(jsonObj));

        jQuery.ajaxSetup({async:false});
        let result = executeCommandAtGivenBaseUrl(req, baseUrl, apiEndPoint);
        jQuery.ajaxSetup({async:true});

        let data = JSON.parse(result);

        if (data.status === 400) {
            enableFields();
            $("#saveBtn").prop("disabled", false);
            $("#resetBtn").prop("disabled", false);
            $("#fullName").focus();
        } else {
            let record = JSON.parse(data.data).record;

            $("#fullName").val(record["Full-Name"]);
            $("#studentClass").val(record["Class"]);
            $("#birthDate").val(record["Birth-Date"]);
            $("#address").val(record["Address"]);
            $("#enrollmentDate").val(record["Enrollment-Date"]);

            enableFields();

            $("#rollNo").prop("disabled", true);
            $("#updateBtn").prop("disabled", false);
            $("#resetBtn").prop("disabled", false);

            $("#fullName").focus();
        }
    }

    function saveStudent() {
        if (!validateForm()) return;

        let req = createPUTRequest(connToken, getStudentData(), dbName, relName);

        jQuery.ajaxSetup({async:false});
        executeCommandAtGivenBaseUrl(req, baseUrl, apiEndPoint);
        jQuery.ajaxSetup({async:true});

        alert("Student saved successfully!");
        resetForm();
    }

    function updateStudent() {
        if (!validateForm()) return;

        let req = createUPDATERecordRequest(connToken, getStudentData(), dbName, relName);

        jQuery.ajaxSetup({async:false});
        executeCommandAtGivenBaseUrl(req, baseUrl, apiEndPoint);
        jQuery.ajaxSetup({async:true});

        alert("Student updated successfully!");
        resetForm();
    }
</script>

</body>
</html>
